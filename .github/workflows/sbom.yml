name: SBOM

on:
  push:
    branches:
      - main
    paths:
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/go.mod"
      - "**/go.sum"
      - "**/Dockerfile"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
      - "compose*.yml"
      - "compose*.yaml"
      - "scripts/generate_sbom.py"
      - ".github/workflows/sbom.yml"
  pull_request:
    paths:
      - "**/requirements*.txt"
      - "**/pyproject.toml"
      - "**/go.mod"
      - "**/go.sum"
      - "**/Dockerfile"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
      - "compose*.yml"
      - "compose*.yaml"
      - "scripts/generate_sbom.py"
      - ".github/workflows/sbom.yml"
      - "docs/sbom/darkstar.cdx.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate CycloneDX SBOM
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate SBOM
        run: python scripts/generate_sbom.py

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkstar-cyclonedx-sbom
          path: docs/sbom/darkstar.cdx.json

      - name: Validate committed SBOM on pull requests
        run: git diff --exit-code -- docs/sbom/darkstar.cdx.json

  update:
    name: Update CycloneDX SBOM
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate SBOM
        run: python scripts/generate_sbom.py

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkstar-cyclonedx-sbom
          path: docs/sbom/darkstar.cdx.json

      - name: Commit updated SBOM
        run: |
          if git diff --quiet -- docs/sbom/darkstar.cdx.json; then
            echo "SBOM is current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sbom/darkstar.cdx.json
          git commit -m "chore: update generated SBOM"
          git push
