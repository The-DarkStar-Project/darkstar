name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-smoke:
    name: Unit and smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Run unit and smoke tests
        run: python -m pytest -m "not playwright" --junitxml=test-results/pytest-unit-smoke.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-unit-smoke
          path: test-results/pytest-unit-smoke.xml

  playwright:
    name: Playwright browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          RUN_PLAYWRIGHT: "1"
        run: python -m pytest -m playwright --junitxml=test-results/pytest-playwright.xml

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/pytest-playwright.xml
            test-results/playwright/
